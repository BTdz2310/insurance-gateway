# =============================================================================
# Nginx config — PVIS Digital / Insurance Gateway
# Yêu cầu: biểu mẫu PVI mục 9 (TLS 1.2+, port 443/80, 2 App Server upstream)
#
# Topology Production:
#   Internet → Nginx (API-App01 / API-App02) → Node.js :3000 (local PM2)
#
# Cách dùng:
#   sudo nginx -t -c /path/to/nginx.conf   # kiểm tra cú pháp
#   sudo nginx -s reload                   # reload không downtime
#
# Thay thế trước khi dùng:
#   YOUR_DOMAIN        → domain thực (vd: api.pvis.vn)
#   APP_SERVER_01_IP   → IP nội bộ của node 1
#   APP_SERVER_02_IP   → IP nội bộ của node 2
# =============================================================================

user  nginx;
worker_processes  auto;                   # tự scale theo số CPU core
worker_rlimit_nofile  65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging — mục 13: thu thập Access log / Audit log
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time ut="$upstream_response_time" '
                    'x_client_id="$http_x_client_id"';

    access_log  /var/log/nginx/access.log  main  buffer=16k  flush=5s;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    types_hash_max_size 2048;
    server_tokens       off;              # ẩn version Nginx trong response header

    # Giới hạn kích thước request body — đủ cho payload tạo đơn bảo hiểm
    client_max_body_size    2m;
    client_body_timeout     30s;
    client_header_timeout   10s;
    send_timeout            60s;

    # -------------------------------------------------------------------------
    # Gzip — giảm băng thông JSON response
    # -------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   4;
    gzip_types        application/json application/javascript text/plain text/css;

    # -------------------------------------------------------------------------
    # Upstream — 2 App Server Production (mục 6 biểu mẫu)
    # Khi chỉ có 1 server (DEV/UAT) thì comment bớt node 2.
    # -------------------------------------------------------------------------
    upstream node_app {
        # least_conn phân phối đều hơn round-robin khi request có thời lượng khác nhau
        least_conn;

        server  APP_SERVER_01_IP:3000  max_fails=3  fail_timeout=15s;
        server  APP_SERVER_02_IP:3000  max_fails=3  fail_timeout=15s  backup;

        # Giữ persistent connection đến Node.js — giảm TCP handshake overhead
        keepalive  32;
    }

    # -------------------------------------------------------------------------
    # Rate limiting — bổ sung tầng Nginx trước khi vào NestJS Throttler
    # -------------------------------------------------------------------------
    # Zone cho API partner (limit theo IP)
    limit_req_zone  $binary_remote_addr  zone=api_partner:10m  rate=30r/m;
    # Zone riêng cho login admin — chống brute-force
    limit_req_zone  $binary_remote_addr  zone=admin_login:10m  rate=5r/m;
    # Zone cho callback PVI gọi vào
    limit_req_zone  $binary_remote_addr  zone=pvi_callback:10m  rate=60r/m;

    limit_req_status   429;
    limit_conn_zone    $binary_remote_addr  zone=conn_per_ip:10m;
    limit_conn         conn_per_ip  50;

    # -------------------------------------------------------------------------
    # Redirect HTTP → HTTPS (mục 12: toàn bộ kết nối dùng HTTPS)
    # -------------------------------------------------------------------------
    server {
        listen       80;
        listen       [::]:80;
        server_name  YOUR_DOMAIN;

        # Let's Encrypt ACME challenge — cần khi renew cert
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server chính
    # -------------------------------------------------------------------------
    server {
        listen       443 ssl;
        listen       [::]:443 ssl;
        http2        on;
        server_name  YOUR_DOMAIN;

        # ---------------------------------------------------------------------
        # SSL / TLS — mục 12: TLS 1.2 trở lên bắt buộc
        # ---------------------------------------------------------------------
        ssl_certificate      /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key  /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers  off;

        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  1d;
        ssl_session_tickets  off;

        # OCSP stapling — giảm TLS handshake latency
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ---------------------------------------------------------------------
        # Security headers
        # (helmet trong NestJS đã set phần lớn — Nginx thêm các header infra)
        # ---------------------------------------------------------------------
        add_header  Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload"  always;
        add_header  X-Content-Type-Options     "nosniff"                                        always;
        add_header  X-Frame-Options            "DENY"                                           always;
        add_header  Referrer-Policy            "strict-origin-when-cross-origin"                always;

        # ---------------------------------------------------------------------
        # Health check — không log, không rate limit (probe của PVI/LB)
        # ---------------------------------------------------------------------
        location = /health {
            access_log  off;
            proxy_pass  http://node_app;
            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
        }

        location = /health/live {
            access_log  off;
            proxy_pass  http://node_app;
            proxy_set_header  Host               $host;
            proxy_set_header  X-Real-IP          $remote_addr;
            proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
        }

        # ---------------------------------------------------------------------
        # Admin endpoints — rate limit login riêng, block từ Internet nếu cần
        # ---------------------------------------------------------------------
        location = /admin/auth/login {
            limit_req   zone=admin_login  burst=3  nodelay;

            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }

        location /admin/ {
            # Tùy chọn: chỉ cho phép IP nội bộ hoặc VPN truy cập admin
            # allow  10.0.0.0/8;
            # deny   all;

            limit_req   zone=api_partner  burst=10  nodelay;

            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }

        # ---------------------------------------------------------------------
        # PVI Callback — PVI gọi vào, limit cao hơn
        # ---------------------------------------------------------------------
        location = /pvi/callback {
            limit_req   zone=pvi_callback  burst=20  nodelay;

            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }

        # ---------------------------------------------------------------------
        # Partner API endpoints
        # ---------------------------------------------------------------------
        location /api/pvi/ {
            limit_req   zone=api_partner  burst=15  nodelay;

            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }

        location /transaction {
            limit_req   zone=api_partner  burst=10  nodelay;

            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }

        # ---------------------------------------------------------------------
        # Dev tool — chỉ cho phép localhost / internal network
        # ---------------------------------------------------------------------
        location /dev/ {
            allow   127.0.0.1;
            allow   10.0.0.0/8;
            allow   172.16.0.0/12;
            allow   192.168.0.0/16;
            deny    all;

            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }

        # ---------------------------------------------------------------------
        # Swagger docs — internal only
        # ---------------------------------------------------------------------
        location /docs {
            allow   127.0.0.1;
            allow   10.0.0.0/8;
            allow   172.16.0.0/12;
            allow   192.168.0.0/16;
            deny    all;

            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }

        # ---------------------------------------------------------------------
        # Catch-all — mọi route còn lại qua Node.js
        # ---------------------------------------------------------------------
        location / {
            proxy_pass  http://node_app;
            include     /etc/nginx/proxy_params;
        }
    }
}
