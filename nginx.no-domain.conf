# =============================================================================
# /etc/nginx/sites-available/insurance-gateway
# DEV / UAT — chưa có domain, chưa có SSL
#
# Deploy:
#   sudo cp nginx.no-domain.conf /etc/nginx/sites-available/insurance-gateway
#   sudo ln -s /etc/nginx/sites-available/insurance-gateway \
#              /etc/nginx/sites-enabled/insurance-gateway
#   sudo nginx -t && sudo systemctl reload nginx
#
#   Firewall: mở port 9000, đóng port 8080 ra ngoài
#   sudo ufw allow 9000/tcp
#   sudo ufw deny 8080/tcp
# =============================================================================

# Rate limiting — khai báo ở http block nên cần để trong /etc/nginx/conf.d/
# Nếu VPS chưa có các zone này thì tạo file:
#   /etc/nginx/conf.d/insurance-gateway-zones.conf
# với nội dung 3 dòng limit_req_zone bên dưới, rồi bỏ comment ở đây.
#
# limit_req_zone $binary_remote_addr zone=igw_api:10m     rate=30r/m;
# limit_req_zone $binary_remote_addr zone=igw_login:10m   rate=5r/m;
# limit_req_zone $binary_remote_addr zone=igw_callback:10m rate=60r/m;

upstream igw_app {
    server    127.0.0.1:8080;
    keepalive 16;
}

server {
    listen       9000;
    listen       [::]:9000;
    server_name  _;               # chấp nhận mọi IP, không cần domain

    access_log  /var/log/nginx/insurance-gateway.access.log;
    error_log   /var/log/nginx/insurance-gateway.error.log  warn;

    client_max_body_size  2m;
    server_tokens         off;

    # -------------------------------------------------------------------------
    # Health check — không log, để probe LB/PVI gọi thoải mái
    # -------------------------------------------------------------------------
    location = /health {
        access_log  off;
        proxy_pass         http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
    }

    location = /health/live {
        access_log  off;
        proxy_pass         http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
    }

    # -------------------------------------------------------------------------
    # Admin login — brute-force protection
    # Bỏ comment limit_req sau khi đã tạo zone file bên trên
    # -------------------------------------------------------------------------
    location = /admin/auth/login {
        # limit_req  zone=igw_login  burst=3  nodelay;
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }

    location /admin/ {
        # limit_req  zone=igw_api  burst=10  nodelay;
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # PVI Callback
    # -------------------------------------------------------------------------
    location = /pvi/callback {
        # limit_req  zone=igw_callback  burst=20  nodelay;
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # Partner API
    # -------------------------------------------------------------------------
    location /api/pvi/ {
        # limit_req  zone=igw_api  burst=15  nodelay;
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }

    location /transaction {
        # limit_req  zone=igw_api  burst=10  nodelay;
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }

    # -------------------------------------------------------------------------
    # Dev tool + Docs
    # -------------------------------------------------------------------------
    location /dev/ {
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
    }

    location /docs {
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
    }

    # -------------------------------------------------------------------------
    # Catch-all
    # -------------------------------------------------------------------------
    location / {
        proxy_pass  http://igw_app;
        proxy_http_version 1.1;
        proxy_set_header  Connection        "";
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }
}
